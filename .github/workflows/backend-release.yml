name: Backend Release

on:
  push:
    tags:
      - "moodle-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish"
        required: true
        type: string
      prerelease:
        description: "Mark the release as unstable"
        required: false
        default: false
        type: boolean
      release_name:
        description: "Optional release title override"
        required: false
        type: string

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      semver_tag: ${{ steps.resolve.outputs.semver_tag }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
    steps:
      - name: Resolve release input
        id: resolve
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG:-}"
          if [[ "${EVENT_NAME}" == "push" ]]; then
            tag="${REF_NAME}"
          fi
          if [[ ! "${tag}" =~ ^moodle-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$ ]]; then
            echo "::error::Backend release tags must match moodle-vX.Y.Z or moodle-vX.Y.Z-prerelease."
            exit 1
          fi

          semver_tag="${tag#moodle-}"
          prerelease="${INPUT_PRERELEASE:-false}"
          prerelease_identifiers="${BASH_REMATCH[5]:-}"
          if [[ -n "${prerelease_identifiers}" ]]; then
            IFS=. read -r -a identifiers <<< "${prerelease_identifiers}"
            for identifier in "${identifiers[@]}"; do
              if [[ "${identifier}" =~ ^[0-9]+$ && "${identifier}" == 0[0-9]* ]]; then
                echo "::error::Numeric prerelease identifiers must not contain leading zeroes."
                exit 1
              fi
            done
            prerelease=true
          elif [[ "${prerelease}" == "true" ]]; then
            echo "::error::Prereleases must use a suffixed tag such as moodle-v1.2.3-rc.1."
            exit 1
          fi
          release_name="${INPUT_RELEASE_NAME:-Moodle CLI ${semver_tag}}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "semver_tag=${semver_tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ steps.resolve.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/moodle/go.mod
          cache: true
          cache-dependency-path: services/moodle/go.sum

      - name: Run backend tests
        working-directory: services/moodle
        run: go test ./...

      - name: Prepare semantic version tag for GoReleaser
        shell: bash
        env:
          SEMVER_TAG: ${{ steps.resolve.outputs.semver_tag }}
        run: |
          set -euo pipefail
          git tag --force "${SEMVER_TAG}" "$(git rev-parse HEAD)"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          workdir: services/moodle
          args: release --clean --skip=publish
        env:
          GORELEASER_CURRENT_TAG: ${{ steps.resolve.outputs.semver_tag }}

      - name: Create or repair GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          name: ${{ steps.resolve.outputs.release_name }}
          prerelease: ${{ steps.resolve.outputs.prerelease }}
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            services/moodle/dist/moodle_*.tar.gz
            services/moodle/dist/moodle_*.zip
            services/moodle/dist/checksums.txt

  verify-cli-install:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout released source
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          ref: ${{ needs.release.outputs.tag }}

      - name: Install in clean Linux amd64 container
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
          PRERELEASE: ${{ needs.release.outputs.prerelease }}
          ASSERT_LATEST: ${{ github.event_name == 'push' && needs.release.outputs.prerelease != 'true' }}
        run: |
          set -euo pipefail
          docker run --rm --platform linux/amd64 \
            --volume "${PWD}:/workspace:ro" \
            --env "RELEASE_TAG=${RELEASE_TAG}" \
            --env "PRERELEASE=${PRERELEASE}" \
            --env "ASSERT_LATEST=${ASSERT_LATEST}" \
            debian:bookworm-slim \
            bash -ceu '
              apt-get update >/dev/null
              apt-get install -y --no-install-recommends ca-certificates curl tar >/dev/null

              VERSION="${RELEASE_TAG}" INSTALL_DIR=/usr/local/bin \
                bash /workspace/services/moodle/scripts/install.sh
              test "$(moodle --version)" = "${RELEASE_TAG#moodle-v}"
              moodle update --check

              if [[ "${PRERELEASE}" != "true" ]]; then
                rm /usr/local/bin/moodle
                INSTALL_DIR=/usr/local/bin bash /workspace/services/moodle/scripts/install.sh
                latest_version="$(moodle --version)"
                if [[ "${ASSERT_LATEST}" == "true" ]]; then
                  test "${latest_version}" = "${RELEASE_TAG#moodle-v}"
                fi
                moodle update --check
              fi
            '

  runtime-base-image:
    needs:
      - release
      - verify-cli-install
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.image.outputs.ref }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          ref: ${{ needs.release.outputs.tag }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail

          hash="$(sha256sum services/moodle/docker/runtime-base/Dockerfile services/moodle/go.mod services/moodle/go.sum | sha256sum | cut -c1-16)"
          name="ghcr.io/dotnaos/moodle-runtime-base"
          tag="bookworm-${hash}"
          echo "name=${name}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "ref=${name}:${tag}" >> "${GITHUB_OUTPUT}"

      - name: Check runtime base image
        id: base
        continue-on-error: true
        shell: bash
        run: docker buildx imagetools inspect "${{ steps.image.outputs.ref }}" >/dev/null

      - name: Prepare runtime base metadata
        id: meta
        if: steps.base.outcome != 'success'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=bookworm
            type=raw,value=${{ steps.image.outputs.tag }}

      - name: Build and push runtime base image
        if: steps.base.outcome != 'success'
        uses: docker/build-push-action@v7
        with:
          context: services/moodle
          file: services/moodle/docker/runtime-base/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend-runtime-base
          cache-to: type=gha,mode=max,scope=backend-runtime-base

  container-image:
    needs:
      - release
      - runtime-base-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          ref: ${{ needs.release.outputs.tag }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dotnaos/moodle
          tags: |
            type=raw,value=${{ needs.release.outputs.tag }}
            type=raw,value=${{ needs.release.outputs.tag }}-amd64
            type=raw,value=latest,enable=${{ needs.release.outputs.prerelease != 'true' }}
            type=raw,value=latest-amd64,enable=${{ needs.release.outputs.prerelease != 'true' }}

      - name: Build and push backend container image
        uses: docker/build-push-action@v7
        with:
          context: services/moodle
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUNTIME_BASE_IMAGE=${{ needs.runtime-base-image.outputs.image-ref }}
          cache-from: type=gha,scope=backend-container-amd64
          cache-to: type=gha,mode=max,scope=backend-container-amd64
